<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineStream | Watch Minecraft Movie</title>
    <style>
        :root { --primary: #55aa33; --bg: #0a0a0a; --surface: #1a1a1a; --text: #ffffff; }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; }
        nav { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; text-transform: uppercase; }
        .content { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        
        /* Server Buttons */
        .server-list { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .server-btn { 
            background: #333; border: 1px solid var(--primary); color: white; 
            padding: 8px 15px; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .server-btn:hover { background: var(--primary); color: black; }

        .player-container { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info-card { background: var(--surface); margin-top: 25px; padding: 25px; border-radius: 12px; }
        .badge { background: var(--primary); color: black; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MineStream</a>
        <div style="font-size: 0.9rem; color: #888;">Live on GitHub Pages</div>
    </nav>

    <main class="content">
        <div class="server-list">
            <button class="server-btn" onclick="changeServer('https://vidsrc.me/embed/movie/tt12580682')">Server 1 (VidSrc)</button>
            <button class="server-btn" onclick="changeServer('https://vidsrc.cc/v2/embed/movie/tt12580682')">Server 2 (VidSrc CC)</button>
            <button class="server-btn" onclick="changeServer('https://player.videasy.net/movie/950387')">Server 3 (Videasy)</button>
        </div>

        <div class="player-container">
            <iframe id="videoPlayer" src="https://vidsrc.me/embed/movie/tt12580682" allowfullscreen></iframe>
        </div>

        <div class="info-card">
            <h1>A Minecraft Movie <span class="badge">HD</span></h1>
            <p>If a server shows "Unavailable," try switching to a different server using the buttons above.</p>
        </div>
    </main>

    <script>
        function changeServer(url) {
            document.getElementById('videoPlayer').src = url;
        }
    </script>
</body>
</html>
