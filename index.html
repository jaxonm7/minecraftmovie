<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault | Watch Movie</title>
    <style>
        /* Modern Dark Theme */
        body {
            margin: 0;
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navigation Bar */
        nav {
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { color: #e50914; font-weight: bold; font-size: 24px; text-decoration: none; }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* The Video Theater Area */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Movie Info Section */
        .movie-details {
            margin-top: 30px;
        }

        .movie-title { font-size: 32px; margin-bottom: 10px; }
        .meta { color: #aaa; margin-bottom: 20px; }
        .description { line-height: 1.6; color: #ddd; max-width: 800px; }

    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">STREAMVAULT</a>
    </nav>

    <div class="container">
        <div class="video-wrapper">
            <iframe 
                src="https://player.videasy.net/movie/950387" 
                allowfullscreen 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <div class="movie-details">
            <h1 class="movie-title">Movie Title Here</h1>
            <div class="meta">2024 • Action / Sci-Fi • 2h 15m</div>
            <p class="description">
                This is where you can write a description for the movie. By wrapping the player in a custom 
                container, it feels like a native part of your website's UI rather than a random link.
            </p>
        </div>
    </div>

</body>
</html>
