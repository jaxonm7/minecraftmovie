<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineStream | Minecraft Movie</title>
    <style>
        :root { --primary: #55aa33; --bg: #0a0a0a; --surface: #1a1a1a; --text: #ffffff; }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Nav Bar */
        nav { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-decoration: none; text-transform: uppercase; }
        
        /* Main Container */
        .content { max-width: 1000px; margin: 20px auto; padding: 0 15px; }

        /* Server Controls */
        .controls { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn { 
            background: #222; border: 1px solid var(--primary); color: white; 
            padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: var(--primary); color: black; }
        .btn.active { background: var(--primary); color: black; }

        /* The Player Wrapper */
        .player-wrapper { 
            position: relative; background: #000; border-radius: 12px; 
            overflow: hidden; aspect-ratio: 16 / 9; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        
        /* The Sandbox Shield */
        iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; 
        }

        .info-card { background: var(--surface); margin-top: 25px; padding: 25px; border-radius: 12px; }
        .desc { color: #aaa; line-height: 1.6; margin-top: 10px; }
        
        /* Tips section */
        .tips { font-size: 0.85rem; color: #666; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
